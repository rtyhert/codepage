version: "3.8"

services:
  codepage:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/server/prisma/data
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
